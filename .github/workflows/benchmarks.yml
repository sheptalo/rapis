name: Benchmarks

on:
  workflow_dispatch:
  schedule:
    # Mondays 06:00 UTC — adjust if noisy
    - cron: "0 6 * * 1"

permissions:
  contents: write

concurrency:
  group: benchmarks-${{ github.repository }}
  cancel-in-progress: true

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NO_COLOR: false
      BENCH_DURATION: 12s
      BENCH_CONNECTIONS: 40
      BENCH_ROUTE_COUNT: "256"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r benchmarks/requirements.txt

      - name: Install oha
        env:
          OHA_VERSION: v1.14.0
        run: |
          set -eux
          curl -sSL \
            "https://github.com/hatoo/oha/releases/download/${OHA_VERSION}/oha-linux-amd64" \
            -o oha
          chmod +x oha
          sudo mv oha /usr/local/bin/

      - name: Run benchmarks
        run: python benchmarks/run_benchmarks.py

      - name: Render README
        run: python benchmarks/render_readme.py

      - name: Commit updated README and results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(benchmarks): refresh results [skip ci]"
          file_pattern: benchmarks/README.md
